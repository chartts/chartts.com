<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <linearGradient id="wm-bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#080E1A"/>
    </linearGradient>
    <linearGradient id="wm-stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wm-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="wm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(0, 5)">
    <rect width="90" height="90" rx="20" fill="url(#wm-bg)"/>
    <rect x="0.5" y="0.5" width="89" height="89" rx="19.5" fill="none" stroke="#1E293B" stroke-width="1"/>
    <g stroke="#1E293B" stroke-width="0.5">
      <line x1="16" y1="30" x2="74" y2="30" opacity="0.4"/>
      <line x1="16" y1="45" x2="74" y2="45" opacity="0.3"/>
      <line x1="16" y1="60" x2="74" y2="60" opacity="0.2"/>
    </g>
    <path d="M 16,68 L 32,56 L 46,60 L 60,40 L 74,24 L 74,72 L 16,72 Z" fill="url(#wm-area)"/>
    <path d="M 16,68 L 32,56 L 46,60 L 60,40 L 74,24"
          fill="none" stroke="url(#wm-stroke)" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#wm-glow)"/>
    <circle cx="74" cy="24" r="3" fill="#22D3EE"/>
  </g>

  <!-- Wordmark text -->
  <text x="108" y="70" font-family="Outfit, 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="58" letter-spacing="-1.5" fill="#F1F5F9">chart</text>
  <text x="330" y="70" font-family="Outfit, 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="58" letter-spacing="-1.5" fill="#22D3EE">.ts</text>
</svg>
